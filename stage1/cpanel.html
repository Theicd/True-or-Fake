<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>True or Fake — CPanel</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f14;--surface:#121821;--border:rgba(120,145,170,.14);
  --accent:#00e5ff;--truth:#00ff94;--danger:#ff3b3b;--warn:#ffb020;
  --text:#e6edf3;--muted:#8b949e;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Assistant',sans-serif;min-height:100vh;direction:rtl}
.brand-wordmark{display:inline-flex;align-items:baseline;gap:4px;direction:ltr;font-family:'Orbitron',sans-serif;letter-spacing:.7px;text-transform:uppercase}
.brand-wordmark .ln-true{background:linear-gradient(90deg,var(--truth),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
.brand-wordmark .ln-or{color:#708090;font-size:.8em;font-weight:500}
.brand-wordmark .ln-fake{background:linear-gradient(90deg,var(--danger),#ff7a45);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}

/* ── Login ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;width:100%;max-width:360px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.25)}
.login-box h1{font-size:1.35rem;margin-bottom:6px}
.login-box .sub{color:var(--muted);font-size:.85rem;margin-bottom:24px}
.field{margin-bottom:14px;text-align:right}
.field label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:4px}
.field input{width:100%;background:#1c1c2a;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.95rem;direction:ltr;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}
.btn-login{width:100%;background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;border-radius:8px;color:#041018;font-weight:700;font-size:1rem;padding:11px;cursor:pointer;margin-top:6px;transition:opacity .2s}
.btn-login:hover{opacity:.88}
.err-msg{color:var(--danger);font-size:.85rem;margin-top:8px;min-height:20px}
.remember-wrap{display:flex;align-items:center;gap:8px;justify-content:flex-start;margin-top:2px;margin-bottom:4px;color:var(--muted);font-size:.82rem}
.remember-wrap input{accent-color:var(--accent)}

/* ── Shell (post-login) ── */
.shell{display:none;flex-direction:column;min-height:100vh}
.topbar{background:#10161f;border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px}
.topbar h1{font-size:1.1rem;flex:1}
.topbar .badge{background:rgba(0,229,255,.1);color:var(--accent);border:1px solid rgba(0,229,255,.18);border-radius:20px;font-size:.75rem;padding:3px 10px}
.btn-logout{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:.8rem;padding:6px 14px;cursor:pointer;transition:border-color .2s,color .2s}
.btn-logout:hover{border-color:var(--danger);color:var(--danger)}
.content{flex:1;padding:20px;max-width:1000px;margin:0 auto;width:100%}

/* ── Stats bar ── */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;text-align:center}
.stat-card .sv{font-size:1.6rem;font-weight:700;color:var(--accent)}
.stat-card .sl{font-size:.75rem;color:var(--muted);margin-top:2px}

/* ── Data sources panel ── */
.sources-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}
.sources-panel h3{font-size:.92rem;margin-bottom:10px}
.sources-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:8px}
.src-chip{border:1px solid var(--border);border-radius:8px;padding:7px 9px;font-size:.78rem;color:var(--muted);background:#0f1520}
.src-chip.ok{border-color:rgba(0,255,148,.3);color:#9ff4cd}
.src-chip.off{border-color:rgba(255,176,32,.3);color:#ffd28a}
.rss-list{font-size:.76rem;color:var(--muted);line-height:1.5;word-break:break-all}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.toolbar h2{font-size:1rem;flex:1}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger);border-radius:8px;padding:7px 16px;font-size:.85rem;cursor:pointer;transition:background .2s}
.btn-danger:hover{background:rgba(255,85,85,.15)}
.btn-refresh{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 14px;font-size:.85rem;cursor:pointer;transition:border-color .2s,color .2s}
.btn-refresh:hover{border-color:var(--accent);color:var(--accent)}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:#1a1a2a;padding:10px 12px;text-align:right;color:var(--muted);font-weight:600;white-space:nowrap}
td{padding:9px 12px;border-top:1px solid rgba(255,255,255,.05);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.025)}
.score-chip{display:inline-block;border-radius:20px;padding:2px 8px;font-size:.78rem;font-weight:700}
.sc-hi{background:rgba(0,200,122,.15);color:var(--accent)}
.sc-med{background:rgba(232,160,32,.15);color:var(--warn)}
.sc-lo{background:rgba(255,85,85,.15);color:var(--danger)}
.narr-pill{display:inline-block;background:rgba(255,255,255,.07);border-radius:20px;padding:2px 8px;font-size:.75rem}
.owner-tag{font-family:monospace;font-size:.72rem;color:var(--muted)}
.btn-del{background:transparent;border:none;color:var(--danger);cursor:pointer;font-size:.9rem;padding:4px 8px;border-radius:6px;transition:background .15s}
.btn-del:hover{background:rgba(255,85,85,.15)}
.btn-del:disabled{opacity:.4;cursor:not-allowed}

/* ── Loading / Empty ── */
.loading-row td,.empty-row td{text-align:center;padding:32px;color:var(--muted)}
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══ -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>⚙️ <span class="brand-wordmark"><span class="ln-true">True</span><span class="ln-or">or</span><span class="ln-fake">Fake</span></span> CPanel</h1>
    <p class="sub">ממשק ניהול מנהל מערכת</p>
    <div class="field">
      <label>שם משתמש</label>
      <input type="text" id="cpUser" placeholder="admin" autocomplete="username" dir="ltr">
    </div>
    <div class="field">
      <label>סיסמה</label>
      <input type="password" id="cpPass" placeholder="••••••" autocomplete="current-password" dir="ltr">
    </div>
    <label class="remember-wrap">
      <input type="checkbox" id="rememberCreds" checked>
      <span>זכור שם משתמש וסיסמה במחשב זה</span>
    </label>
    <button class="btn-login" id="btnLogin">כניסה</button>
    <div class="err-msg" id="loginErr"></div>
  </div>
</div>

<!-- ══ ADMIN SHELL ══ -->
<div class="shell" id="shell">
  <div class="topbar">
    <h1>⚙️ <span class="brand-wordmark"><span class="ln-true">True</span><span class="ln-or">or</span><span class="ln-fake">Fake</span></span> CPanel</h1>
    <span class="badge" id="adminBadge">admin</span>
    <button class="btn-logout" id="btnLogout">התנתק</button>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-card"><div class="sv" id="st-total">—</div><div class="sl">סה"כ דוחות</div></div>
      <div class="stat-card"><div class="sv" id="st-avg">—</div><div class="sl">ממוצע אמינות</div></div>
      <div class="stat-card"><div class="sv" id="st-video">—</div><div class="sl">וידאו</div></div>
      <div class="stat-card"><div class="sv" id="st-image">—</div><div class="sl">תמונות</div></div>
      <div class="stat-card"><div class="sv" id="st-text">—</div><div class="sl">טקסט</div></div>
      <div class="stat-card"><div class="sv" id="st-size">—</div><div class="sl">גודל (KB)</div></div>
    </div>

    <div class="sources-panel">
      <h3>מקורות מידע מחוברים</h3>
      <div class="sources-grid" id="sourcesGrid"></div>
      <div class="rss-list" id="rssFeeds"></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <h2>דוחות משותפים</h2>
      <button class="btn-refresh" id="btnRefresh">🔄 רענן</button>
      <button class="btn-danger" id="btnClearAll">🗑 מחק הכל</button>
    </div>

    <!-- Table -->
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>תאריך</th>
            <th>קובץ</th>
            <th>סוג</th>
            <th>ציון</th>
            <th>נרטיב</th>
            <th>רמת סיכון</th>
            <th>בעלים</th>
            <th>מחיקה</th>
          </tr>
        </thead>
        <tbody id="reportsTbody">
          <tr class="loading-row"><td colspan="9">⏳ טוען...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = '';
let _session = sessionStorage.getItem('cp_session') || '';
let _reports = [];
const CREDS_KEY = 'cpanel_saved_credentials_v1';

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── AUTH ──
document.getElementById('btnLogin').addEventListener('click', doLogin);
document.getElementById('cpPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

loadSavedCredentials();

async function doLogin(){
  const u = document.getElementById('cpUser').value.trim();
  const p = document.getElementById('cpPass').value;
  const remember = document.getElementById('rememberCreds').checked;
  const err = document.getElementById('loginErr');
  err.textContent = '';
  if(!u||!p){ err.textContent='נא למלא את כל השדות'; return; }
  document.getElementById('btnLogin').disabled = true;
  try{
    const fd = new FormData();
    fd.append('username', u);
    fd.append('password', p);
    const r = await fetch('/api/admin/login',{method:'POST',body:fd});
    const data = await r.json();
    if(data.ok && data.session){
      _session = data.session;
      sessionStorage.setItem('cp_session', _session);
      persistCredentials(u, p, remember);
      showShell(u);
      loadAll();
    } else {
      err.textContent = data.error || 'שגיאת כניסה';
    }
  } catch(e){
    err.textContent = 'שגיאת רשת: '+e.message;
  }
  document.getElementById('btnLogin').disabled = false;
}

function showShell(username){
  document.getElementById('loginWrap').style.display = 'none';
  const shell = document.getElementById('shell');
  shell.style.display = 'flex';
  document.getElementById('adminBadge').textContent = username || 'admin';
}

function persistCredentials(username, password, remember){
  if(!remember){
    localStorage.removeItem(CREDS_KEY);
    return;
  }
  try{
    localStorage.setItem(CREDS_KEY, JSON.stringify({ username, password }));
  }catch(e){ /* ignore storage errors */ }
}

function loadSavedCredentials(){
  try{
    const raw = localStorage.getItem(CREDS_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    if(data && data.username) document.getElementById('cpUser').value = data.username;
    if(data && data.password) document.getElementById('cpPass').value = data.password;
  }catch(e){ /* ignore malformed data */ }
}

document.getElementById('btnLogout').addEventListener('click', ()=>{
  _session = '';
  sessionStorage.removeItem('cp_session');
  location.reload();
});

// ── AUTO-LOGIN if session in storage ──
(async function(){
  if(!_session) return;
  try{
    const r = await fetch('/api/admin/stats',{headers:{Authorization:'Bearer '+_session}});
    if(r.ok){ showShell('admin'); loadAll(); }
    else { _session=''; sessionStorage.removeItem('cp_session'); }
  }catch(e){ /* ignore */ }
})();

// ── LOAD STATS + REPORTS ──
async function loadAll(){
  loadStats();
  loadReports();
}

async function loadStats(){
  try{
    const r = await fetch('/api/admin/stats',{headers:{Authorization:'Bearer '+_session}});
    if(!r.ok){ if(r.status===401) handleUnauth(); return; }
    const d = await r.json();
    document.getElementById('st-total').textContent = d.total ?? '—';
    document.getElementById('st-avg').textContent = d.avg_truth_score != null ? d.avg_truth_score+'%' : '—';
    document.getElementById('st-video').textContent = (d.by_media_type||{}).video ?? 0;
    document.getElementById('st-image').textContent = (d.by_media_type||{}).image ?? 0;
    document.getElementById('st-text').textContent  = (d.by_media_type||{}).text  ?? 0;
    document.getElementById('st-size').textContent  = d.storage_kb ?? '—';
    renderSources(d.connected_sources || {});
  }catch(e){ /* ignore */ }
}

function renderSources(sources){
  const grid = document.getElementById('sourcesGrid');
  const rss = document.getElementById('rssFeeds');
  if(!grid || !rss) return;
  const engines = Array.isArray(sources.engines) ? sources.engines : [];
  if(!engines.length){
    grid.innerHTML = '<div class="src-chip off">אין נתוני מקורות זמינים</div>';
    rss.textContent = '';
    return;
  }
  let h='';
  engines.forEach(e=>{
    const on = !!e.enabled;
    h += `<div class="src-chip ${on?'ok':'off'}">${esc(e.id||'source')} · ${on?'ON':'OFF'}</div>`;
  });
  grid.innerHTML = h;

  const feeds = Array.isArray(sources.rss_feeds) ? sources.rss_feeds : [];
  if(feeds.length){
    rss.innerHTML = '<strong>RSS Feeds:</strong><br>' + feeds.map(f=>esc(f)).join('<br>');
  }else{
    rss.innerHTML = '<strong>RSS Feeds:</strong> לא מוגדרים';
  }
}

async function loadReports(){
  const tbody = document.getElementById('reportsTbody');
  tbody.innerHTML = '<tr class="loading-row"><td colspan="9">⏳ טוען...</td></tr>';
  try{
    const r = await fetch('/api/admin/reports',{headers:{Authorization:'Bearer '+_session}});
    if(!r.ok){ if(r.status===401) handleUnauth(); return; }
    const d = await r.json();
    _reports = d.reports || [];
    renderTable();
  }catch(e){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">שגיאת רשת</td></tr>';
  }
}

function renderTable(){
  const tbody = document.getElementById('reportsTbody');
  if(!_reports.length){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">אין דוחות</td></tr>';
    return;
  }
  let h = '';
  _reports.forEach((rep, i)=>{
    const date = new Date(rep.date).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
    const sc = rep.truthScore||0;
    const scClass = sc>=60?'sc-hi':sc>=35?'sc-med':'sc-lo';
    const icon = rep.mediaType==='video'?'📺':rep.mediaType==='image'?'📸':'📄';
    const riskColor = (rep.riskLevel||'').toLowerCase()==='high'?'color:#ff5555':(rep.riskLevel||'').toLowerCase()==='medium'?'color:#e8a020':'';
    h += `<tr>
      <td>${i+1}</td>
      <td style="white-space:nowrap;font-size:.75rem">${date}</td>
      <td title="${esc(rep.fileName)}">${esc((rep.fileName||'').slice(0,28))}${(rep.fileName||'').length>28?'…':''}</td>
      <td>${icon} ${esc(rep.mediaType||'')}</td>
      <td><span class="score-chip ${scClass}">${sc}%</span></td>
      <td><span class="narr-pill">${esc(rep.narrative||'')}</span></td>
      <td style="${riskColor}">${esc(rep.riskLevel||'')}</td>
      <td><span class="owner-tag">${esc((rep.owner||'').slice(0,8)+'…')}</span></td>
      <td><button class="btn-del" data-id="${esc(rep.id)}" title="מחק דוח זה">🗑</button></td>
    </tr>`;
  });
  tbody.innerHTML = h;
  tbody.querySelectorAll('.btn-del').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.dataset.id;
      if(!confirm('למחוק דוח זה?')) return;
      btn.disabled = true;
      try{
        const r = await fetch('/api/admin/reports/'+encodeURIComponent(id),{method:'DELETE',headers:{Authorization:'Bearer '+_session}});
        if(r.ok){ _reports=_reports.filter(x=>x.id!==id); renderTable(); loadStats(); }
        else{ const d=await r.json(); alert(d.error||'שגיאה'); btn.disabled=false; }
      }catch(e){ alert('שגיאת רשת'); btn.disabled=false; }
    });
  });
}

// ── REFRESH ──
document.getElementById('btnRefresh').addEventListener('click', loadAll);

// ── CLEAR ALL ──
document.getElementById('btnClearAll').addEventListener('click', async ()=>{
  if(!confirm('למחוק את כל הדוחות? פעולה זו אינה הפיכה!')) return;
  if(!confirm('האם אתה בטוח לחלוטין?')) return;
  try{
    const r = await fetch('/api/admin/reports',{method:'DELETE',headers:{Authorization:'Bearer '+_session}});
    if(r.ok){ _reports=[]; renderTable(); loadStats(); }
    else{ const d=await r.json(); alert(d.error||'שגיאה'); }
  }catch(e){ alert('שגיאת רשת'); }
});

function handleUnauth(){
  _session=''; sessionStorage.removeItem('cp_session'); location.reload();
}
</script>
</body>
</html>
